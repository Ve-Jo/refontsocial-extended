items:
  filler:
    material: BLACK_STAINED_GLASS_PANE
    name: " "

  back:
    material: ARROW
    name: "§fНазад"
    lore:
      - "§7Вернуться"

  next:
    material: ARROW
    name: "§fВперёд"
    lore:
      - "§7Следующая страница"

  like:
